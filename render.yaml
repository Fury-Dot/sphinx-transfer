services:
  - type: web
    name: securetransfer
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      cd asm && gcc -shared -o fury.so -fPIC fury.c -O2
    startCommand: gunicorn api.app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
